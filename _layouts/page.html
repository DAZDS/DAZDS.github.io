<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>
    {% if page.title %}{{ page.title }} · {% endif %}{{ site.title | default: "DAZ Consulting DS" }}
  </title>

  <meta name="description" content="{{ page.description | default: site.description | default: 'Industrial EPC advisory and project controls.' }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- System font stack is fine; keep Google fonts optional -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>

<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Go to home">
        <!-- CEPS-like square logo (SVG). Replace later with your final file if you prefer -->
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 96 96" role="img">
            <rect x="6" y="6" width="84" height="84" rx="6" fill="none" stroke="currentColor" stroke-width="4"/>
            <!-- D (left) -->
            <text x="22" y="58" font-size="34" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto" font-weight="600" text-anchor="middle">D</text>
            <!-- A (center) -->
            <text x="48" y="58" font-size="34" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto" font-weight="600" text-anchor="middle">A</text>
            <!-- DS (right) -->
            <text x="74" y="58" font-size="22" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto" font-weight="600" text-anchor="middle">DS</text>
          </svg>
        </span>

        <span class="brand__text">
          <span class="brand__name">DAZ Consulting DS</span>
          <span class="brand__tag">Industrial EPC Advisory · Project Controls</span>
          <span class="brand__sub">DAZ Sentinel — a division of DAZ Consulting DS</span>
        </span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a class="nav__link {% if page.url == '/' %}is-active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
        <a class="nav__link {% if page.url contains '/services' %}is-active{% endif %}" href="{{ '/services/' | relative_url }}">Services</a>
        <a class="nav__link {% if page.url contains '/writeups' %}is-active{% endif %}" href="{{ '/writeups/' | relative_url }}">Writeups</a>
        <a class="nav__link {% if page.url contains '/articles' %}is-active{% endif %}" href="{{ '/articles/' | relative_url }}">Articles</a>
        <a class="nav__link {% if page.url contains '/certifications' %}is-active{% endif %}" href="{{ '/certifications/' | relative_url }}">Certifications</a>
        <a class="nav__link {% if page.url contains '/contact' %}is-active{% endif %}" href="{{ '/contact/' | relative_url }}">Contact</a>
      </nav>

      <!-- Simple corporate search (site-restricted DuckDuckGo) -->
      <form class="search" action="https://duckduckgo.com/" method="get" target="_blank" rel="noopener">
        <input type="hidden" name="q" value="site:{{ site.url | default: 'dazconsultingds.com' }}" />
        <label class="sr-only" for="q">Search</label>
        <input id="q" name="q" class="search__input" type="search" placeholder="Search…" />
        <button class="search__btn" type="submit" aria-label="Search">
          <span aria-hidden="true">⌕</span>
        </button>
      </form>

      <button class="burger" type="button" aria-label="Open menu" onclick="document.body.classList.toggle('nav-open')">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__left">
        <div>© {{ 'now' | date: '%Y' }} DAZ Consulting DS · DAZ Sentinel</div>
      </div>
      <div class="footer__right">
        <a href="{{ '/contact/' | relative_url }}">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    // Close mobile menu after clicking a link
    document.addEventListener('click', function (e) {
      const link = e.target.closest('.nav__link');
      if (link) document.body.classList.remove('nav-open');
    });
  </script>
</body>
</html>
